name: Deploy to Vercel
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
permissions:
  contents: read
concurrency:
  group: vercel-production
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Lint
        run: npm run lint

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Apply database migrations
        run: npx prisma migrate deploy
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Pull Vercel production configuration
        run: npx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production artifact
        run: npx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production artifact
        run: npx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
