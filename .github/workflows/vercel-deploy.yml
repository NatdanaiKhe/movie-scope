name: Deploy to Vercel
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
permissions:
  contents: read
concurrency:
  group: vercel-production
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Validate Prisma schema
        run: bunx prisma validate

      - name: Apply database migrations
        run: bunx prisma migrate deploy

      - name: Pull Vercel production configuration
        run: bunx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production artifact
        run: bunx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy production artifact
        run: bunx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
