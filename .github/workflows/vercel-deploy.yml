name: Deploy to Vercel
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
permissions:
  contents: read
concurrency:
  group: vercel-production
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Validate Prisma schema
        run: npx prisma validate
      - name: Apply database migrations
        run: npx prisma migrate deploy
      - name: Pull Vercel production configuration
        run: npx vercel@latest pull --yes --environment=production
      - name: Build production artifact
        run: npx vercel@latest build --prod
      - name: Deploy production artifact
        run: npx vercel@latest deploy --prebuilt --prod
